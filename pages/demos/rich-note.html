<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Rich text rendered as text runs, links, code spans, and atomic chips, with live width changes powered by Pretext.">
  <title>Rich Text</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    :root {
      --bg-0: #07060d;
      --bg-1: #0d0b1a;
      --bg-2: #15122a;
      --glass: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --ink: #f0ecff;
      --muted: rgba(240, 236, 255, 0.52);
      --accent: #7c6fff;
      --rule: rgba(255, 255, 255, 0.08);
      --panel: rgba(255, 255, 255, 0.04);
      --note-width: 556px;
      --note-content-width: 516px;
    }
    html, body {
      min-height: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(ellipse 140% 60% at 50% -10%, var(--bg-2) 0%, transparent 70%),
        var(--bg-0);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    /* Back nav */
    .demo-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(7, 6, 13, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .demo-nav-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 8px;
      font: 600 13px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--accent);
      text-decoration: none;
      transition: background 160ms ease;
    }
    .demo-nav-back:hover { background: rgba(124, 111, 255, 0.12); }
    .demo-nav-back:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .demo-nav-sep { color: var(--muted); font-size: 14px; }
    .demo-nav-title {
      font: 600 13px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--muted);
    }

    .page {
      width: min(940px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 36px 0 56px;
    }
    .intro {
      width: min(720px, 100%);
      margin: 0 auto 20px;
    }
    .eyebrow {
      margin: 0 0 10px;
      font: 600 11px/1.2 "SF Mono", ui-monospace, monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    h1 {
      margin: 0;
      font: 800 34px/1.08 -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      letter-spacing: -0.025em;
    }
    .lede {
      margin: 10px 0 0;
      max-width: 63ch;
      font: 400 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--muted);
    }
    .toolbar {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 16px 18px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }
    .toolbar-label {
      font: 600 11px/1 "SF Mono", ui-monospace, Menlo, monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }
    .toolbar-value {
      font: 600 13px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--muted);
    }
    .preview {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 24px;
    }
    .note-shell {
      width: var(--note-width);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .note-body {
      position: relative;
      width: var(--note-content-width);
      min-height: 34px;
    }
    .line-row {
      position: absolute;
      left: 0;
      display: flex;
      align-items: baseline;
      flex-wrap: nowrap;
      gap: 0;
      width: max-content;
    }
    .frag {
      display: inline-block;
      white-space: pre;
      font: 500 17px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      vertical-align: baseline;
    }
    .frag--link {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.14em;
    }
    .frag--code {
      padding: 2px 7px 3px;
      border-radius: 9px;
      background: rgba(124, 111, 255, 0.12);
      font: 600 14px/1 "SF Mono", ui-monospace, Menlo, monospace;
      letter-spacing: 0;
      color: var(--accent);
    }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      min-height: 24px;
      border-radius: 999px;
      font: 700 12px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      white-space: nowrap;
      border: 1px solid transparent;
      vertical-align: baseline;
      transform: translateY(-1px);
    }
    .chip--mention { background: rgba(21, 90, 136, 0.18); color: #7ec8f4; border-color: rgba(21, 90, 136, 0.25); }
    .chip--status { background: rgba(196, 129, 20, 0.18); color: #f5c252; border-color: rgba(196, 129, 20, 0.25); }
    .chip--priority { background: rgba(176, 44, 44, 0.18); color: #f87171; border-color: rgba(176, 44, 44, 0.25); }
    .chip--time { background: rgba(70, 118, 77, 0.18); color: #6ee78e; border-color: rgba(70, 118, 77, 0.25); }
    .chip--count { background: rgba(124, 111, 255, 0.18); color: #c4beff; border-color: rgba(124, 111, 255, 0.25); }
    @media (prefers-reduced-motion: reduce) {
      .demo-nav-back { transition: none; }
    }
    @media (max-width: 900px) {
      .preview {
        justify-content: center;
      }
    }
    @media (max-width: 640px) {
      .page {
        width: min(100vw - 20px, 940px);
        padding-top: 24px;
      }
      h1 { font-size: 28px; }
      .toolbar {
        grid-template-columns: 1fr;
        justify-items: stretch;
        border-radius: 22px;
      }
      .toolbar-label,
      .toolbar-value {
        text-align: left;
      }
      .note-shell {
        border-radius: 24px;
        padding-inline: 14px;
      }
    }
  </style>
</head>
<body>
  <nav class="demo-nav" aria-label="Site navigation">
    <a href="/demos" class="demo-nav-back"><span aria-hidden="true">←</span> Demos</a>
    <span class="demo-nav-sep" aria-hidden="true">/</span>
    <span class="demo-nav-title">Rich Text</span>
  </nav>
  <main class="page">
    <section class="intro">
      <p class="eyebrow">Demo</p>
      <h1>Rich Text</h1>
      <p class="lede">
        Rich text rendered as text runs, links, code spans, and atomic chips.
        Adjust the text width to watch the chips stay whole while the surrounding text and code keep wrapping naturally when space gets tight.
      </p>
    </section>

    <div class="toolbar">
      <div class="toolbar-label">Text Width</div>
      <input id="width-slider" type="range" min="260" max="760" value="516">
      <span class="toolbar-value" id="width-value">516px</span>
    </div>

    <section class="preview">
      <article class="note-shell" id="note-shell">
        <div class="note-body" id="note-body"></div>
      </article>
    </section>
  </main>
  <script type="module" src="./rich-note.ts"></script>
</body>
</html>
