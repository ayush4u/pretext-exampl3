<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Rich text rendered as text runs, links, code spans, and atomic chips, with live width changes powered by Pretext.">
  <title>Rich Text</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    :root {
      color-scheme: light;
      --page: #f5f1ea;
      --panel: #fffdf8;
      --ink: #201b18;
      --muted: #6d645d;
      --rule: #d8cec3;
      --accent: #955f3b;
      --note-width: 556px;
      --note-content-width: 516px;
    }
    html, body {
      min-height: 100%;
      background: linear-gradient(180deg, #fbf7f0 0%, var(--page) 100%);
      color: var(--ink);
    }
    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }
    .page {
      width: min(940px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }
    .intro {
      width: min(720px, 100%);
      margin: 0 auto 20px;
    }
    .eyebrow {
      margin: 0 0 8px;
      font: 12px/1.2 "SF Mono", ui-monospace, monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }
    h1 {
      margin: 0;
      font: 700 34px/1.08 Georgia, "Times New Roman", serif;
    }
    .lede {
      margin: 10px 0 0;
      max-width: 63ch;
      font: 400 15px/1.52 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--muted);
    }
    .toolbar {
      width: min(720px, 100%);
      margin: 0 auto;
      padding: 16px 18px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      border: 1px solid var(--rule);
      border-radius: 18px;
      background: color-mix(in srgb, var(--panel) 92%, white 8%);
      box-shadow: 0 18px 40px rgb(54 40 23 / 0.08);
    }
    .toolbar-label {
      font: 600 11px/1 "SF Mono", ui-monospace, Menlo, monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }
    .toolbar-value {
      font: 600 13px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--muted);
    }
    .preview {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 24px;
    }
    .note-shell {
      width: var(--note-width);
      border: 1px solid var(--rule);
      border-radius: 20px;
      padding: 20px;
      background: color-mix(in srgb, var(--panel) 94%, white 6%);
      box-shadow: 0 18px 40px rgb(54 40 23 / 0.08);
    }
    .note-body {
      position: relative;
      width: var(--note-content-width);
      min-height: 34px;
    }
    .line-row {
      position: absolute;
      left: 0;
      display: flex;
      align-items: baseline;
      flex-wrap: nowrap;
      gap: 0;
      width: max-content;
    }
    .frag {
      display: inline-block;
      white-space: pre;
      font: 500 17px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--ink);
      vertical-align: baseline;
    }
    .frag--link {
      color: #b9aaff;
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.14em;
    }
    .frag--code {
      padding: 2px 7px 3px;
      border-radius: 9px;
      background: rgba(138,116,255,0.12);
      font: 600 14px/1 "SF Mono", ui-monospace, Menlo, monospace;
      letter-spacing: 0;
    }
    .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 28px;
    padding: 7px 14px 7px 10px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--surface);
    font: 500 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: var(--muted);
    text-decoration: none;
    transition: border-color var(--transition), color var(--transition), background var(--transition);
  }
  .back-link:hover {
    border-color: var(--border-hover);
    color: var(--ink);
    background: var(--surface-hover);
  }
  .back-link:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }
    .chip {
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      min-height: 24px;
      border-radius: 999px;
      font: 700 12px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      white-space: nowrap;
      border: 1px solid transparent;
      vertical-align: baseline;
      transform: translateY(-1px);
    }
    .chip--mention { background: rgba(56,200,255,0.12); color: #38c8ff; border-color: rgba(56,200,255,0.2); }
    .chip--status { background: rgba(255,200,56,0.1); color: #ffc838; border-color: rgba(255,200,56,0.18); }
    .chip--priority { background: rgba(255,80,100,0.1); color: #ff5064; border-color: rgba(255,80,100,0.18); }
    .chip--time { background: rgba(80,220,120,0.1); color: #50dc78; border-color: rgba(80,220,120,0.18); }
    .chip--count { background: var(--accent-soft); color: var(--accent); border-color: rgba(138,116,255,0.22); }
    @media (max-width: 900px) {
      .preview {
        justify-content: center;
      }
    }
    @media (max-width: 640px) {
      .page {
        width: min(100vw - 20px, 940px);
        padding-top: 22px;
      }
      h1 { font-size: 30px; }
      .toolbar {
        grid-template-columns: 1fr;
        justify-items: stretch;
        border-radius: 22px;
      }
      .toolbar-label,
      .toolbar-value {
        text-align: left;
      }
      .note-shell {
        border-radius: 24px;
        padding-inline: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back-link" href="/demos">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true"><path d="M7.5 2.5L4 6l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      All demos
    </a>
    <section class="intro">
      <p class="eyebrow">Demo</p>
      <h1>Rich Text</h1>
      <p class="lede">
        Rich text rendered as text runs, links, code spans, and atomic chips.
        Adjust the text width to watch the chips stay whole while the surrounding text and code keep wrapping naturally when space gets tight.
      </p>
    </section>

    <div class="toolbar">
      <div class="toolbar-label">Text Width</div>
      <input id="width-slider" type="range" min="260" max="760" value="516">
      <span class="toolbar-value" id="width-value">516px</span>
    </div>

    <section class="preview">
      <article class="note-shell" id="note-shell">
        <div class="note-body" id="note-body"></div>
      </article>
    </section>
  </main>
  <script type="module" src="./rich-note.ts"></script>
</body>
</html>
